# AI-ASSISTED: Cursor
# PROMPT: Suppress Selenium CDP JUL warnings on console
# ACCEPTED-BY: vignesh

# Java Util Logging — keep console quiet for Selenium CDP noise
handlers=java.util.logging.ConsoleHandler
.level=INFO

java.util.logging.ConsoleHandler.level=SEVERE
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Selenium CDP / Chromium version-match warnings (harmless for WebDriver)
org.openqa.selenium.level=SEVERE
org.openqa.selenium.devtools.level=OFF
org.openqa.selenium.chromium.level=OFF
org.openqa.selenium.devtools.CdpVersionFinder.level=OFF
org.openqa.selenium.chromium.ChromiumDriver.level=OFF
